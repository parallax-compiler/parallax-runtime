name: Runtime Build

# Builds the Parallax Vulkan runtime and runs its unit test. GitHub runners have
# no physical GPU, so we install Mesa lavapipe (a software Vulkan implementation)
# to exercise the device path. The unit test is GPU-optional and returns success
# when no device is present, so this job gates on a clean build + run.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain + software Vulkan (lavapipe)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build g++ \
            libvulkan-dev vulkan-tools mesa-vulkan-drivers glslang-tools

      - name: Show Vulkan devices (lavapipe, auto-discovered)
        run: vulkaninfo --summary 2>&1 | head -40 || echo "vulkaninfo unavailable (non-fatal)"

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-fsanitize=address -fno-omit-frame-pointer -g" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address" \
            -DCMAKE_SHARED_LINKER_FLAGS="-fsanitize=address"

      - name: Build
        run: cmake --build build -j

      - name: Test (software Vulkan, ASan)
        env:
          # Leak detection is deferred until the Phase 1e migration/coherence work
          # removes the known per-launch buffer leak; memory-safety checks stay on.
          ASAN_OPTIONS: detect_leaks=0
        # The Interpose test overrides operator new, which conflicts with ASan's
        # own allocator interceptor — it is run in the non-ASan build below.
        run: ctest --test-dir build --output-on-failure -E Interpose

      # Allocation interposition replaces operator new, so it cannot run under
      # ASan (ASan owns operator new). Build + run it without sanitizers.
      - name: Configure + build + test (no ASan, interposition)
        run: |
          sudo apt-get install -y gdb || true
          cmake -S . -B build-nosan -G Ninja -DCMAKE_BUILD_TYPE=Debug
          cmake --build build-nosan -j
          export LD_LIBRARY_PATH="$PWD/build-nosan:$LD_LIBRARY_PATH"
          echo "=== direct run ==="
          ./build-nosan/tests/test_interpose || {
            echo "=== gdb backtrace ==="
            gdb -batch -ex run -ex bt --args ./build-nosan/tests/test_interpose || true
            exit 1
          }
